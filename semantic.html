<!DOCTYPE html>
<html>
<head>
    <title>Semantic Formatting Interactive</title>
</head>
<body>

<header>
    <h1>My Page</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
</nav>

<section>
    <article>
        <h2>HTML</h2>
        <p>HTML is used to create webpages.</p>
    </article>
</section>

<aside>
    <p>Side content</p>
</aside>

<footer>
    <p>End of page</p>
</footer>

<hr>

<p><b>Bold</b></p>
<p><i>Italic</i></p>
<p><u>Underline</u></p>
<p><mark>Highlight</mark></p>
<p><small>Small text</small></p>

<hr>

<button onclick="alert('Clicked')">Click</button>

<details>
    <summary>More</summary>
    <p>Hidden text</p>
</details>

<form>
    Name: <input type="text"><br><br>
    Email: <input type="email"><br><br>
    <input type="submit">
</form>

</body>
</html>
